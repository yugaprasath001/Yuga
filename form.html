<html>
<head>
    <title>
        Student Registration Form</title>
</head>
<body>
    <form action="/submit" method="post">
        <h1>Student Admission Registration Form </h1>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <h1>Personal Details</h1>
        <label for="dob">Date of Birth:</label>
        
        </select>
        <input type="date" id="dob" name="dob" required>
        <name="gender" id="">
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="50" required></textarea>
        <br><br>
        <h2>Course Details</h2>
        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="">Select a course</option>
            <option value="computer_science">Computer Science</option>
            <option value="business">Business</option>
            <option value="engineering">Engineering</option>
        </select>
        <br><br>
        <label for="10th Percentage">10th Percentage:</label>
        <input type="number" id="10th Percentage" name="semester" min="0" max="100" required>
        <br><br>
        <label for="12th Percentage">12th Percentage:</label>
        <input type="number" id="12th Percentage" name="semester" min="0" max="100" required>
        <br><br>
        <label for="School name">School Name:</label>
        <input type="text" id="School name" name="semester" required> 
        <br><br>
        <label for="year">Year of Passing:</label>
        <input type="number" id="year" name="year" min="1" max="2023" required>
        <br><br>

        <input type="submit" value="Submit">
    </form>
    <form action="" method="post"></form>
</body>
</html>
